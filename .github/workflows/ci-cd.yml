name: Production CI/CD Microservices

on:
  push:
    branches: ["main"]

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2"

jobs:

# =========================
# 1. BUILD + TEST
# =========================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & test all modules
        run: mvn clean verify -Dspring.profiles.active=test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: "**/target/*.jar"


# =========================
# 2. SECURITY SCAN
# =========================
  security:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "sqs-service"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --failOnCVSS 7
            --enableExperimental

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports


# =========================
# 3. SONAR QUALITY
# =========================
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Sonar scan (Maven)
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=sqs-service \
            -Dsonar.projectName="SQS Microservices" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# =========================
# 4. DOCKER BUILD (OPTIMIZED)
# =========================
  docker:
    name: Build Microservices Images
    runs-on: ubuntu-latest
    needs: [build, security, sonar]

    strategy:
      matrix:
        service:
          - pedido-service
          - stock-service
          - pago-service
          - email-service
          - factura-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.microservice
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          build-args: |
            MODULE_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# =========================
# 5. DEPLOY
# =========================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy microservices
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/pedido-service

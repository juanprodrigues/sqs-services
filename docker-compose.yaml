version: "3.9"

x-ms-common: &ms-common
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    localstack:
      condition: service_healthy
  environment:
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: root
    AWS_ENDPOINT: http://localstack:4566
  networks:
    - backend

services:

  db:
    image: mysql:8.0
    container_name: mysql-db
    platform: linux/amd64
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - backend

  localstack:
    image: localstack/localstack:3
    platform: linux/amd64
    container_name: localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./docker/localstack:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  pedido-service:
    <<: *ms-common
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        MODULE_NAME: pedido-service
    container_name: pedido-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pedido_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AWS_ENDPOINT: http://localstack:4566

  stock-service:
    <<: *ms-common
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        MODULE_NAME: stock-service
    container_name: stock-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/stock_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AWS_ENDPOINT: http://localstack:4566

  pago-service:
    <<: *ms-common
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        MODULE_NAME: pago-service
    container_name: pago-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pago_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AWS_ENDPOINT: http://localstack:4566

  email-service:
    <<: *ms-common
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        MODULE_NAME: email-service
    container_name: email-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/email_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AWS_ENDPOINT: http://localstack:4566

  factura-service:
    <<: *ms-common
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        MODULE_NAME: factura-service
    container_name: factura-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/factura_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AWS_ENDPOINT: http://localstack:4566

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
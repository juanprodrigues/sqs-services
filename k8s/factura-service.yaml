apiVersion: apps/v1
kind: Deployment
metadata:
  name: factura-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: factura-service
  template:
    metadata:
      labels:
        app: factura-service
    spec:
      containers:
      - name: factura-service
        image: ghcr.io/juanprodrigues/factura-service:latest
        ports:
        - containerPort: 8084

---
apiVersion: v1
kind: Service
metadata:
  name: factura-service
spec:
  selector:
    app: factura-service
  ports:
  - port: 8084
    targetPort: 8084

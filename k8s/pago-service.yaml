apiVersion: apps/v1
kind: Deployment
metadata:
  name: pago-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pago-service
  template:
    metadata:
      labels:
        app: pago-service
    spec:
      containers:
      - name: pago-service
        image: ghcr.io/juanprodrigues/pago-service:latest
        ports:
        - containerPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  name: pago-service
spec:
  selector:
    app: pago-service
  ports:
  - port: 8082
    targetPort: 8082
